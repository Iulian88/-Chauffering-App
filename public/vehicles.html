<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Fleet Management — Chauffering App</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      min-height: 100vh;
      padding: 20px;
    }

    .container { max-width: 1100px; margin: 0 auto; }

    /* ── Header ── */
    .header {
      background: #fff;
      border-radius: 10px;
      padding: 24px 30px;
      margin-bottom: 24px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      display: flex;
      align-items: center;
      justify-content: space-between;
      flex-wrap: wrap;
      gap: 16px;
    }
    .header h1 { color: #667eea; font-size: 22px; }
    .header p  { color: #666; font-size: 14px; margin-top: 4px; }
    .header-right { display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }

    /* ── Auth bar ── */
    .auth-bar {
      background: #fff;
      border-radius: 10px;
      padding: 16px 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
      display: flex;
      gap: 12px;
      align-items: flex-end;
      flex-wrap: wrap;
    }
    .auth-bar .fg { display: flex; flex-direction: column; gap: 4px; flex: 1; min-width: 200px; }
    .auth-bar label { font-size: 12px; font-weight: 600; color: #555; }
    .auth-bar input {
      padding: 8px 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 13px;
    }
    .auth-bar input:focus { outline: none; border-color: #667eea; }

    /* ── Cards / panels ── */
    .card {
      background: #fff;
      border-radius: 10px;
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: 0 4px 6px rgba(0,0,0,.1);
    }
    .card h2 { color: #667eea; font-size: 17px; margin-bottom: 18px; display: flex; align-items: center; gap: 8px; }

    /* ── Buttons ── */
    button, .btn {
      background: linear-gradient(135deg, #667eea, #764ba2);
      color: #fff;
      border: none;
      padding: 9px 18px;
      border-radius: 6px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .15s;
      text-decoration: none;
      display: inline-block;
    }
    button:hover { opacity: .88; transform: scale(1.01); }
    .btn-sm { padding: 5px 11px; font-size: 12px; }
    .btn-outline {
      background: none;
      border: 2px solid #667eea;
      color: #667eea;
    }
    .btn-danger  { background: linear-gradient(135deg, #e53935, #c62828); }
    .btn-success { background: linear-gradient(135deg, #10b981, #059669); }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
      gap: 14px;
      margin-bottom: 16px;
    }
    .fg { display: flex; flex-direction: column; gap: 5px; }
    .fg label { font-size: 13px; font-weight: 600; color: #444; }
    .fg input, .fg select {
      padding: 9px 12px;
      border: 2px solid #ddd;
      border-radius: 6px;
      font-size: 14px;
      font-family: inherit;
    }
    .fg input:focus, .fg select:focus { outline: none; border-color: #667eea; }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead th {
      text-align: left;
      padding: 10px 14px;
      background: #f3f4f6;
      color: #555;
      font-weight: 600;
      border-bottom: 2px solid #e5e7eb;
    }
    tbody tr { border-bottom: 1px solid #f0f0f0; transition: background .15s; }
    tbody tr:hover { background: #fafafa; }
    tbody td { padding: 10px 14px; color: #333; vertical-align: middle; }

    /* ── Segment badges ── */
    .badge {
      display: inline-block;
      padding: 3px 10px;
      border-radius: 12px;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .4px;
    }
    .badge-ride       { background: #e0f2fe; color: #0369a1; }
    .badge-business   { background: #fef3c7; color: #92400e; }
    .badge-executive  { background: #ede9fe; color: #5b21b6; }
    .badge-office_lux { background: #d1fae5; color: #065f46; }
    .badge-prime_lux  { background: #fce7f3; color: #9d174d; }
    .badge-unknown    { background: #f3f4f6; color: #6b7280; }

    /* ── Status dot ── */
    .dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; margin-right: 5px; }
    .dot-green  { background: #10b981; }
    .dot-gray   { background: #9ca3af; }

    /* ── Toast / alerts ── */
    #toast {
      position: fixed; bottom: 24px; right: 24px;
      background: #1f2937; color: #fff;
      padding: 12px 20px; border-radius: 8px;
      font-size: 14px; font-weight: 500;
      opacity: 0; pointer-events: none;
      transition: opacity .3s;
      z-index: 1000;
      max-width: 360px;
    }
    #toast.show { opacity: 1; }
    #toast.error { background: #dc2626; }
    #toast.success { background: #059669; }

    /* ── Modal ── */
    .modal-overlay {
      display: none; position: fixed; inset: 0;
      background: rgba(0,0,0,.45); z-index: 500;
      align-items: center; justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: #fff; border-radius: 12px;
      padding: 28px; width: 100%; max-width: 540px;
      max-height: 90vh; overflow-y: auto;
      box-shadow: 0 20px 60px rgba(0,0,0,.2);
    }
    .modal h3 { color: #667eea; margin-bottom: 20px; font-size: 17px; }
    .modal-footer { display: flex; gap: 10px; justify-content: flex-end; margin-top: 18px; }

    .divider { height: 1px; background: #e5e7eb; margin: 16px 0; }
    .text-muted { color: #9ca3af; font-size: 12px; }
    .op-tag { font-size: 11px; color: #6b7280; }
  </style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="header">
    <div>
      <h1>🚗 Fleet Management</h1>
      <p>Manage vehicles, operators, and segment assignments</p>
    </div>
    <div class="header-right">
      <a href="/" class="btn btn-outline btn-sm">← Dashboard</a>
      <button class="btn btn-success btn-sm" onclick="openAddModal()">+ Add Vehicle</button>
    </div>
  </div>

  <!-- Auth Bar -->
  <div class="auth-bar">
    <div class="fg">
      <label>API Base URL</label>
      <input id="apiBase" type="text" placeholder="https://chauffering-app-production.up.railway.app/api/v1" />
    </div>
    <div class="fg">
      <label>Auth Token</label>
      <input id="authToken" type="text" placeholder="test-token or Bearer eyJ..." />
    </div>
    <div class="fg" style="max-width:200px">
      <label>Operator ID (superadmin only)</label>
      <input id="operatorId" type="text" placeholder="UUID or leave blank" />
    </div>
    <button onclick="loadVehicles()">Load Fleet</button>
  </div>

  <!-- Stats row -->
  <div id="statsRow" style="display:none; margin-bottom:20px;">
    <div style="display:grid; grid-template-columns:repeat(auto-fill,minmax(160px,1fr)); gap:12px;">
      <div class="card" style="padding:16px; margin:0;">
        <div class="text-muted">Total Vehicles</div>
        <div style="font-size:28px; font-weight:700; color:#667eea;" id="statTotal">—</div>
      </div>
      <div class="card" style="padding:16px; margin:0;">
        <div class="text-muted">Assigned</div>
        <div style="font-size:28px; font-weight:700; color:#10b981;" id="statAssigned">—</div>
      </div>
      <div class="card" style="padding:16px; margin:0;">
        <div class="text-muted">Unassigned</div>
        <div style="font-size:28px; font-weight:700; color:#f59e0b;" id="statUnassigned">—</div>
      </div>
      <div class="card" style="padding:16px; margin:0;">
        <div class="text-muted">Active</div>
        <div style="font-size:28px; font-weight:700; color:#8b5cf6;" id="statActive">—</div>
      </div>
    </div>
  </div>

  <!-- Vehicles Table -->
  <div class="card">
    <h2>🚘 Vehicles
      <span id="loadingBadge" style="font-size:12px; color:#9ca3af; font-weight:400;"></span>
    </h2>
    <div class="table-wrap">
      <table id="vehicleTable">
        <thead>
          <tr>
            <th>Make / Model</th>
            <th>Plate</th>
            <th>Segment</th>
            <th>Year</th>
            <th>Color</th>
            <th>Operator</th>
            <th>Driver</th>
            <th>Status</th>
            <th>Actions</th>
          </tr>
        </thead>
        <tbody id="vehicleBody">
          <tr><td colspan="9" class="text-muted" style="padding:20px; text-align:center;">
            Enter your API URL and token, then click "Load Fleet"
          </td></tr>
        </tbody>
      </table>
    </div>
  </div>

</div>

<!-- Add / Edit Vehicle Modal -->
<div class="modal-overlay" id="vehicleModal">
  <div class="modal">
    <h3 id="modalTitle">Add Vehicle</h3>
    <div class="form-grid">
      <div class="fg">
        <label>Make *</label>
        <input id="fMake" type="text" placeholder="e.g. Mercedes-Benz" />
      </div>
      <div class="fg">
        <label>Model *</label>
        <input id="fModel" type="text" placeholder="e.g. E 220 CDI" />
      </div>
      <div class="fg">
        <label>Year *</label>
        <input id="fYear" type="number" placeholder="2023" min="2000" max="2027" />
      </div>
      <div class="fg">
        <label>Plate *</label>
        <input id="fPlate" type="text" placeholder="e.g. B-101-CHF" />
      </div>
      <div class="fg">
        <label>Segment *</label>
        <select id="fSegment">
          <option value="">— select —</option>
          <option value="ride">ride</option>
          <option value="business">business</option>
          <option value="executive">executive</option>
          <option value="office_lux">office_lux</option>
          <option value="prime_lux">prime_lux</option>
        </select>
      </div>
      <div class="fg">
        <label>Color</label>
        <input id="fColor" type="text" placeholder="e.g. Black (optional)" />
      </div>
    </div>
    <div class="fg" style="margin-bottom:10px;">
      <label>Operator ID (superadmin: override operator)</label>
      <input id="fOperatorId" type="text" placeholder="Leave blank to use current operator" />
    </div>
    <div class="modal-footer">
      <button class="btn btn-outline btn-sm" onclick="closeModal()">Cancel</button>
      <button class="btn btn-sm" onclick="submitVehicle()">Save Vehicle</button>
    </div>
  </div>
</div>

<!-- Toast -->
<div id="toast"></div>

<script>
  // ── Config ────────────────────────────────────────────────────────────────
  const DEFAULT_URL = window.location.origin.includes('localhost')
    ? window.location.origin + '/api/v1'
    : 'https://chauffering-app-production.up.railway.app/api/v1';

  // Persist settings in localStorage
  const saved = {
    apiBase: localStorage.getItem('ch_api_base') || DEFAULT_URL,
    token:   localStorage.getItem('ch_token')    || 'test-token',
    opId:    localStorage.getItem('ch_operator_id') || '',
  };
  document.getElementById('apiBase').value    = saved.apiBase;
  document.getElementById('authToken').value  = saved.token;
  document.getElementById('operatorId').value = saved.opId;

  // ── State ─────────────────────────────────────────────────────────────────
  let vehicles  = [];
  let operators = {};   // id → name
  let editingId = null; // null = add mode

  // ── Helpers ───────────────────────────────────────────────────────────────
  function cfg() {
    const apiBase = document.getElementById('apiBase').value.trim().replace(/\/$/, '');
    const token   = document.getElementById('authToken').value.trim();
    const opId    = document.getElementById('operatorId').value.trim();
    localStorage.setItem('ch_api_base',     apiBase);
    localStorage.setItem('ch_token',        token);
    localStorage.setItem('ch_operator_id',  opId);
    return { apiBase, token, opId };
  }

  function headers() {
    const { token } = cfg();
    const t = token.startsWith('Bearer ') ? token : `Bearer ${token}`;
    return { 'Content-Type': 'application/json', Authorization: t };
  }

  async function api(method, path, body) {
    const { apiBase } = cfg();
    const opts = { method, headers: headers() };
    if (body) opts.body = JSON.stringify(body);
    const res = await fetch(apiBase + path, opts);
    const json = await res.json().catch(() => ({}));
    if (!res.ok) throw new Error(json.message || json.error || res.statusText);
    return json;
  }

  function toast(msg, type = '') {
    const el = document.getElementById('toast');
    el.textContent = msg;
    el.className   = 'show ' + type;
    clearTimeout(el._t);
    el._t = setTimeout(() => el.className = '', 3200);
  }

  function segmentBadge(seg) {
    const cls = seg ? 'badge-' + seg : 'badge-unknown';
    return `<span class="badge ${cls}">${seg || '—'}</span>`;
  }

  // ── Load fleet ────────────────────────────────────────────────────────────
  async function loadVehicles() {
    const badge = document.getElementById('loadingBadge');
    badge.textContent = '⏳ loading…';
    try {
      const res  = await api('GET', '/vehicles');
      vehicles = res.data || [];

      // Try to load operators for name display (best-effort, may 403 for non-admin)
      try {
        const opRes = await api('GET', '/operators');
        if (opRes.data) opRes.data.forEach(o => operators[o.id] = o.name);
      } catch (_) { /* non-critical */ }

      renderTable();
      renderStats();
      document.getElementById('statsRow').style.display = 'block';
      badge.textContent = `(${vehicles.length} vehicles)`;
      toast(`Loaded ${vehicles.length} vehicle(s)`, 'success');
    } catch (e) {
      badge.textContent = '';
      toast('Error: ' + e.message, 'error');
    }
  }

  function renderStats() {
    const total      = vehicles.length;
    const assigned   = vehicles.filter(v => v.assigned_driver_id).length;
    const unassigned = total - assigned;
    const active     = vehicles.filter(v => v.is_active).length;
    document.getElementById('statTotal').textContent     = total;
    document.getElementById('statAssigned').textContent  = assigned;
    document.getElementById('statUnassigned').textContent= unassigned;
    document.getElementById('statActive').textContent    = active;
  }

  function renderTable() {
    const tbody = document.getElementById('vehicleBody');
    if (!vehicles.length) {
      tbody.innerHTML = '<tr><td colspan="9" class="text-muted" style="padding:20px;text-align:center;">No vehicles found — click "+ Add Vehicle" to create one</td></tr>';
      return;
    }
    tbody.innerHTML = vehicles.map(v => {
      const opName   = operators[v.operator_id] || `<span class="op-tag">${(v.operator_id||'').slice(0,8)}…</span>`;
      const driverEl = v.assigned_driver_id
        ? `<span style="color:#059669">● ${v.assigned_driver_id.slice(0,8)}…</span>`
        : `<span class="text-muted">Unassigned</span>`;
      const statusEl = v.is_active
        ? `<span class="dot dot-green"></span>Active`
        : `<span class="dot dot-gray"></span>Inactive`;
      return `
        <tr>
          <td><strong>${esc(v.make)}</strong> ${esc(v.model)}</td>
          <td><code>${esc(v.plate)}</code></td>
          <td>${segmentBadge(v.segment)}</td>
          <td>${v.year || '—'}</td>
          <td>${esc(v.color || '—')}</td>
          <td>${opName}</td>
          <td>${driverEl}</td>
          <td>${statusEl}</td>
          <td>
            <button class="btn btn-outline btn-sm" onclick='openEditModal(${JSON.stringify(v)})'>Edit</button>
          </td>
        </tr>`;
    }).join('');
  }

  function esc(s) {
    if (s == null) return '';
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Modal ─────────────────────────────────────────────────────────────────
  function openAddModal() {
    editingId = null;
    document.getElementById('modalTitle').textContent = '+ Add Vehicle';
    ['fMake','fModel','fYear','fPlate','fColor','fOperatorId'].forEach(id => {
      document.getElementById(id).value = '';
    });
    document.getElementById('fSegment').value = '';
    // Pre-fill operator from global setting
    document.getElementById('fOperatorId').value = cfg().opId;
    document.getElementById('vehicleModal').classList.add('open');
  }

  function openEditModal(v) {
    editingId = v.id;
    document.getElementById('modalTitle').textContent = 'Edit Vehicle';
    document.getElementById('fMake').value       = v.make     || '';
    document.getElementById('fModel').value      = v.model    || '';
    document.getElementById('fYear').value       = v.year     || '';
    document.getElementById('fPlate').value      = v.plate    || '';
    document.getElementById('fSegment').value    = v.segment  || '';
    document.getElementById('fColor').value      = v.color    || '';
    document.getElementById('fOperatorId').value = v.operator_id || '';
    document.getElementById('vehicleModal').classList.add('open');
  }

  function closeModal() {
    document.getElementById('vehicleModal').classList.remove('open');
  }

  async function submitVehicle() {
    const make       = document.getElementById('fMake').value.trim();
    const model      = document.getElementById('fModel').value.trim();
    const yearRaw    = document.getElementById('fYear').value.trim();
    const plate      = document.getElementById('fPlate').value.trim();
    const segment    = document.getElementById('fSegment').value;
    const color      = document.getElementById('fColor').value.trim() || undefined;
    const operatorId = document.getElementById('fOperatorId').value.trim() || undefined;

    if (!make || !model || !yearRaw || !plate || !segment) {
      toast('Make, model, year, plate, and segment are required', 'error'); return;
    }
    const year = parseInt(yearRaw, 10);
    if (isNaN(year) || year < 2000 || year > 2027) {
      toast('Year must be between 2000 and 2027', 'error'); return;
    }

    const body = { make, model, year, plate, segment, ...(color && { color }), ...(operatorId && { operator_id: operatorId }) };

    try {
      if (editingId) {
        await api('PATCH', `/vehicles/${editingId}`, body);
        toast('Vehicle updated', 'success');
      } else {
        await api('POST', '/vehicles', body);
        toast('Vehicle created', 'success');
      }
      closeModal();
      await loadVehicles();
    } catch (e) {
      toast('Error: ' + e.message, 'error');
    }
  }

  // Close modal on overlay click
  document.getElementById('vehicleModal').addEventListener('click', function(e) {
    if (e.target === this) closeModal();
  });

  // Auto-load on page open if token is set
  window.addEventListener('DOMContentLoaded', () => {
    if (saved.token && saved.token !== 'test-token') loadVehicles();
  });
</script>
</body>
</html>
